<div id="inSlider" class="carousel carousel-fade" data-ride="carousel" data-interval="6000" data-pause="hover">
    <ol class="carousel-indicators">
        {% for banner in site.data.index.banners %}
        <li data-target="#inSlider" data-slide-to="{{ forloop.index0 }}"{% if forloop.first %} class="active"{% endif %}></li>
        {% endfor %}
    </ol>
    <div class="carousel-inner" role="listbox">
        {% for banner in site.data.index.banners %}
        <div class="item{% if forloop.first %} active{% endif %}">
            <div
                class="header-back"
                style="background-image: url({{ '/static/assets/img/' | prepend: site.baseurl }}{{ banner.src }});"
                title="{{ banner.title }}">
            </div>
        </div>
        {% endfor %}
    </div>
    <a class="left carousel-control" href="#inSlider" role="button" data-slide="prev">
        <span class="glyphicon glyphicon-chevron-left" aria-hidden="true"></span>
        <span class="sr-only">Previous</span>
    </a>
    <a class="right carousel-control" href="#inSlider" role="button" data-slide="next">
        <span class="glyphicon glyphicon-chevron-right" aria-hidden="true"></span>
        <span class="sr-only">Next</span>
    </a>
</div>
